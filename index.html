<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>영의 이중슬릿 실험 시뮬레이션</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #controls {
      display: flex;
      gap: 30px;
      padding: 20px;
      background-color: #1e1e1e;
      width: 100%;
      justify-content: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5);
      z-index: 10;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .control-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type=range] { width: 150px; }
    input[type=number] {
      width: 70px;
      padding: 3px;
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    button:hover { filter: brightness(1.1); }
    #stopBtn { background-color: #F44336; }
    #viewToggleBtn { background-color: #2196F3; }
    #canvas-container {
      position: relative;
      margin-top: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    #tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid #555;
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      pointer-events: none;
      display: none;
      font-size: 14px;
      white-space: nowrap;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div id="controls">
    <div class="control-group">
      <label>빛의 파장 (λ)</label>
      <div class="control-row">
        <input type="range" id="waveSlider" min="380" max="780" step="1" value="532">
        <input type="number" id="waveInput" min="380" max="780" value="532"> nm
      </div>
    </div>
    <div class="control-group">
      <label>슬릿 간격 (d)</label>
      <div class="control-row">
        <input type="range" id="slitSlider" min="0.05" max="0.5" step="0.01" value="0.15">
        <input type="number" id="slitInput" min="0.05" max="0.5" step="0.01" value="0.15"> mm
      </div>
    </div>
    <div class="control-group">
      <label>스크린 거리 (L)</label>
      <div class="control-row">
        <input type="range" id="distSlider" min="0.5" max="3.0" step="0.1" value="1.5">
        <input type="number" id="distInput" min="0.5" max="3.0" step="0.1" value="1.5"> m
      </div>
    </div>
    <!-- 애니메이션 및 뷰 제어 버튼 그룹 -->
    <div class="control-group" style="flex-direction: row; align-items: flex-end; padding-bottom: 2px;">
      <button id="startBtn">▶ 시작</button>
      <button id="stopBtn">⏸ 정지</button>
      <button id="viewToggleBtn">뷰 모드: 동적 파동</button>
    </div>
  </div>

  <div id="canvas-container">
    <div id="tooltip"></div>
  </div>

  <script>
    let lambda_nm = 532;
    let d_mm = 0.15;
    let L_m = 1.5;
    
    let isPlaying = true; // 재생 상태 변수
    let viewMode = 'dynamic';
    let waveColor;
    let time = 0;
    let tooltip;
    
    const canvasW = 1000;
    const canvasH = 600;
    const leftWidth = 600;
    const screenX = leftWidth; 
    
    const physicalScreenHeight_mm = 50; 

    // 공간 배치 x좌표
    const src_x = 20;    // 최초 광원
    const s0_x = 100;    // 단일 슬릿
    const s12_x = 250;   // 이중 슬릿

    function setup() {
      let canvas = createCanvas(canvasW, canvasH);
      canvas.parent('canvas-container');
      tooltip = document.getElementById('tooltip');

      const syncInput = (sliderId, inputId, updateVarFunc) => {
        const slider = document.getElementById(sliderId);
        const input = document.getElementById(inputId);
        slider.addEventListener('input', () => { input.value = slider.value; updateVarFunc(); });
        input.addEventListener('input', () => { slider.value = input.value; updateVarFunc(); });
      };

      syncInput('waveSlider', 'waveInput', () => lambda_nm = parseFloat(document.getElementById('waveSlider').value));
      syncInput('slitSlider', 'slitInput', () => d_mm = parseFloat(document.getElementById('slitSlider').value));
      syncInput('distSlider', 'distInput', () => L_m = parseFloat(document.getElementById('distSlider').value));

      // 시작/정지 이벤트 연결
      document.getElementById('startBtn').addEventListener('click', () => { isPlaying = true; });
      document.getElementById('stopBtn').addEventListener('click', () => { isPlaying = false; });

      document.getElementById('viewToggleBtn').addEventListener('click', (e) => {
        if (viewMode === 'dynamic') {
          viewMode = 'static';
          e.target.innerText = '뷰 모드: 정적 히트맵';
        } else {
          viewMode = 'dynamic';
          e.target.innerText = '뷰 모드: 동적 파동';
        }
      });
    }

    function draw() {
      background(10);
      waveColor = nmToRGB(lambda_nm);
      
      if (isPlaying) {
        time += 0.15; // 재생 중일 때만 시간 증가
      }

      drawLeftView();
      drawRightView();
      handleTooltip();
    }

    function drawLeftView() {
      let slit1_y = canvasH / 2 - (d_mm / physicalScreenHeight_mm * canvasH) / 2;
      let slit2_y = canvasH / 2 + (d_mm / physicalScreenHeight_mm * canvasH) / 2;
      let visualWavelength = map(lambda_nm, 380, 780, 10, 20); 

      if (viewMode === 'dynamic') {
        noFill();
        strokeWeight(1.5);
        
        // 1. 광원 -> 단일 슬릿
        for (let r = (time * 10) % visualWavelength; r < s0_x - src_x; r += visualWavelength) {
          let alpha = map(r, 0, s0_x - src_x, 255, 50);
          stroke(waveColor.r, waveColor.g, waveColor.b, alpha);
          arc(src_x, canvasH / 2, r * 2, r * 2, -HALF_PI, HALF_PI);
        }

        // 2. 단일 슬릿 -> 이중 슬릿
        for (let r = (time * 10) % visualWavelength; r < s12_x - s0_x; r += visualWavelength) {
          let alpha = map(r, 0, s12_x - s0_x, 255, 100);
          stroke(waveColor.r, waveColor.g, waveColor.b, alpha);
          arc(s0_x, canvasH / 2, r * 2, r * 2, -HALF_PI, HALF_PI);
        }

        // 3. 이중 슬릿 -> 스크린
        for (let r = (time * 10) % visualWavelength; r < leftWidth - s12_x; r += visualWavelength) {
          let alpha = map(r, 0, leftWidth - s12_x, 255, 0);
          stroke(waveColor.r, waveColor.g, waveColor.b, alpha);
          arc(s12_x, slit1_y, r * 2, r * 2, -HALF_PI, HALF_PI);
          arc(s12_x, slit2_y, r * 2, r * 2, -HALF_PI, HALF_PI);
        }
      } else {
        loadPixels();
        for (let x = src_x; x < leftWidth; x += 3) { 
          for (let y = 0; y < canvasH; y += 3) {
            let intensity = 0;
            if (x < s0_x) {
              let d = dist(x, y, src_x, canvasH / 2);
              intensity = sq(cos((d / visualWavelength) * TWO_PI));
            } else if (x < s12_x) {
              let d = dist(x, y, s0_x, canvasH / 2);
              intensity = sq(cos((d / visualWavelength) * TWO_PI));
            } else {
              let d1 = dist(x, y, s12_x, slit1_y);
              let d2 = dist(x, y, s12_x, slit2_y);
              let phaseDiff = (abs(d1 - d2) / visualWavelength) * TWO_PI;
              intensity = sq(cos(phaseDiff / 2)); 
            }
            let alpha = intensity * 255 * map(x, src_x, leftWidth, 1, 0.2);
            fill(waveColor.r, waveColor.g, waveColor.b, alpha);
            noStroke();
            rect(x, y, 3, 3);
          }
        }
      }

      // 광원 표시
      fill(waveColor.r, waveColor.g, waveColor.b);
      noStroke();
      ellipse(src_x, canvasH / 2, 8, 8);

      // 벽 그리기
      stroke(150);
      strokeWeight(4);
      let gap = 5; 
      
      // 단일 슬릿 벽
      line(s0_x, 0, s0_x, canvasH / 2 - gap);
      line(s0_x, canvasH / 2 + gap, s0_x, canvasH);
      
      // 이중 슬릿 벽
      line(s12_x, 0, s12_x, slit1_y - gap);
      line(s12_x, slit1_y + gap, s12_x, slit2_y - gap);
      line(s12_x, slit2_y + gap, s12_x, canvasH);
    }

    function drawRightView() {
      stroke(50);
      strokeWeight(1);
      line(screenX, canvasH / 2, canvasW, canvasH / 2);

      let maxIntensityWidth = 150; 

      for (let y = 0; y < canvasH; y++) {
        let physicalY_m = map(y, 0, canvasH, -physicalScreenHeight_mm/2, physicalScreenHeight_mm/2) / 1000;
        
        let r1 = sqrt(sq(L_m) + sq(physicalY_m - (d_mm/1000)/2));
        let r2 = sqrt(sq(L_m) + sq(physicalY_m + (d_mm/1000)/2));
        let deltaX = abs(r1 - r2);
        
        let lambda_m = lambda_nm * 1e-9;
        let phase = (PI * deltaX) / lambda_m;
        let intensity = sq(cos(phase));

        stroke(waveColor.r, waveColor.g, waveColor.b, intensity * 255);
        line(screenX, y, screenX + 100, y);

        let graphX = screenX + 100 + intensity * maxIntensityWidth;
        stroke(waveColor.r, waveColor.g, waveColor.b, 150);
        point(graphX, y);
      }
      
      stroke(100);
      line(screenX, 0, screenX, canvasH);
      line(screenX + 100, 0, screenX + 100, canvasH);
      
      fill(200);
      noStroke();
      textSize(12);
      textAlign(CENTER);
      text("스크린", screenX + 50, 20);
      text("빛의 세기 그래프", screenX + 250, 20);
    }

    function handleTooltip() {
      if (mouseX > screenX && mouseX < screenX + 100 && mouseY > 0 && mouseY < canvasH) {
        let physicalY_m = map(mouseY, 0, canvasH, -physicalScreenHeight_mm/2, physicalScreenHeight_mm/2) / 1000;
        
        let slit1_y = canvasH / 2 - (d_mm / physicalScreenHeight_mm * canvasH) / 2;
        let slit2_y = canvasH / 2 + (d_mm / physicalScreenHeight_mm * canvasH) / 2;

        stroke(255, 255, 255, 100);
        strokeWeight(1);
        drawingContext.setLineDash([5, 5]);
        line(s12_x, slit1_y, screenX, mouseY);
        line(s12_x, slit2_y, screenX, mouseY);
        drawingContext.setLineDash([]);

        let r1 = sqrt(sq(L_m) + sq(physicalY_m - (d_mm/1000)/2));
        let r2 = sqrt(sq(L_m) + sq(physicalY_m + (d_mm/1000)/2));
        let deltaX_nm = abs(r1 - r2) * 1e9; 
        
        let halfLambda = lambda_nm / 2;
        let ratio = deltaX_nm / halfLambda;
        let isConstructive = abs(Math.round(ratio) - ratio) < 0.1 && Math.round(ratio) % 2 === 0;
        let isDestructive = abs(Math.round(ratio) - ratio) < 0.1 && Math.round(ratio) % 2 !== 0;

        let statusText = "중간 지점";
        let colorHex = "#ffffff";
        if (isConstructive) { statusText = "보강 간섭 (밝은 무늬)"; colorHex = "#4CAF50"; }
        else if (isDestructive) { statusText = "상쇄 간섭 (어두운 무늬)"; colorHex = "#F44336"; }

        tooltip.innerHTML = `
          <strong>스크린 위치:</strong> ${mouseY < canvasH/2 ? '중앙 상단' : '중앙 하단'} ${abs((physicalY_m*1000).toFixed(2))} mm<br>
          <strong>경로차 (Δx):</strong> ${deltaX_nm.toFixed(1)} nm<br>
          <strong>λ/2 의 배수:</strong> 약 ${ratio.toFixed(2)} 배<br>
          <span style="color:${colorHex}; font-weight:bold;">${statusText}</span>
        `;
        
        tooltip.style.display = 'block';
        tooltip.style.left = (mouseX + 15) + 'px';
        tooltip.style.top = (mouseY + 15) + 'px';
      } else {
        tooltip.style.display = 'none';
      }
    }

    function nmToRGB(Wavelength) {
      let r, g, b;
      if (Wavelength >= 380 && Wavelength < 440) {
        r = -(Wavelength - 440) / (440 - 380);
        g = 0.0;
        b = 1.0;
      } else if (Wavelength >= 440 && Wavelength < 490) {
        r = 0.0;
        g = (Wavelength - 440) / (490 - 440);
        b = 1.0;
      } else if (Wavelength >= 490 && Wavelength < 510) {
        r = 0.0;
        g = 1.0;
        b = -(Wavelength - 510) / (510 - 490);
      } else if (Wavelength >= 510 && Wavelength < 580) {
        r = (Wavelength - 510) / (580 - 510);
        g = 1.0;
        b = 0.0;
      } else if (Wavelength >= 580 && Wavelength < 645) {
        r = 1.0;
        g = -(Wavelength - 645) / (645 - 580);
        b = 0.0;
      } else if (Wavelength >= 645 && Wavelength <= 780) {
        r = 1.0;
        g = 0.0;
        b = 0.0;
      } else {
        r = 0; g = 0; b = 0;
      }
      
      let factor = 1.0;
      if (Wavelength >= 380 && Wavelength < 420) {
        factor = 0.3 + 0.7 * (Wavelength - 380) / (420 - 380);
      } else if (Wavelength >= 420 && Wavelength < 701) {
        factor = 1.0;
      } else if (Wavelength >= 701 && Wavelength <= 780) {
        factor = 0.3 + 0.7 * (780 - Wavelength) / (780 - 700);
      } else {
        factor = 0.0;
      }
      return { r: Math.round(r * factor * 255), g: Math.round(g * factor * 255), b: Math.round(b * factor * 255) };
    }
  </script>
</body>
</html>
